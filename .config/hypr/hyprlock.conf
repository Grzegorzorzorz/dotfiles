input-field {
    monitor = eDP-1
    size = 480, 48
    outline_thickness = 0
    dots_size = 0.40
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(202020)
    fade_on_empty = true
    placeholder_text =
    hide_input = false

    position = 0, -256
    halign = center
    valign = center
}
