background {
	color = rgba(202020ff) #rgba(252525ff) 15deg
}

label {
    monitor = eDP-1
		text = $TIME
		color = rgb(d0d0d0)
		font_size = 96
		font_family = Noto Sans Light

		position = 0, -128
		halign = center
		valign = top
}

label {
    monitor = eDP-1
		text = cmd[update:1000] echo "$(date '+%A %d %B')"
		color = rgb(d0d0d0)
		font_size = 18
		font_family = Noto Sans Light

		position = 0, -290
		halign = center
		valign = top
}

