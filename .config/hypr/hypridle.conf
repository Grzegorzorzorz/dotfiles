$lock = pidof hyprlock || hyprlock

general {
	lock_cmd = $lock #--immediate --no-fade-in
	before_sleep_cmd = loginctl lock-session
	after_sleep_cmd = hyprctl dispatch dpms on
	ignore_dbus_inhibit = false
}

#listener {
#    timeout = 180
#	on-timeout = $HOME/.config/hypr/scripts/kb-backlight - 1
#	on-resume = $HOME/.config/hypr/scripts/kb-backlight + 1
#}

listener {
    timeout = 590
	on-timeout = $lock --grace 10
}

#listener {
#	timeout = 900
#	on-timeout = hyprctl dispatch dpms off
#	on-resume = hyprctl dispatch dpms on
#}

listener {
    timeout = 1800
	on-timeout = loginctl suspend
	on-resume = $HOME/.config/hypr/scripts/kb-backlight --up
}
