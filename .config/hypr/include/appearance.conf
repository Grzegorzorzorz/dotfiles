general {
    gaps_in = 5
    gaps_out = 10
    border_size = 0
    layout = dwindle
}

xwayland {
  force_zero_scaling = true
}

decoration {
    rounding = 15
    blur {
		size = 5
    	passes = 2
    	new_optimizations = on
	}
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

	bezier = easeOutQuint, 0.22, 1, 0.36, 1
	bezier = easeOutExpo, 0.16, 1, 0.3, 1
	bezier = easeOutCirc, 0, 0.55, 0.45, 1
	bezier = easeInOutCirc, 0.39,0.41,0.01,1
	bezier = overshoot, 0.23,1.1,0.64,1
	bezier = linear, 0, 0, 1, 1

    animation = windowsIn, 1, 5, easeOutQuint, popin
    animation = windowsOut, 1, 4, linear, popin 80%
    animation = windowsMove, 1, 5, easeOutQuint 
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, easeOutExpo, slide
    animation = specialWorkspace, 1, 4, easeOutQuint, slidevert
	animation = layers, 1, 1, easeOutQuint, fade

	#animation = hyprfocusIn, 1, 3, easeOutQuint
	#animation = hyprfocusOut, 1, 3, easeOutQuint
}

blurls=lockscreen
blurls=notifications

misc {
	disable_splash_rendering = true
	disable_hyprland_logo = true
	background_color = rgb(000000)
	allow_session_lock_restore = true
	session_lock_xray = true
}

cursor {
	no_hardware_cursors = false
}

